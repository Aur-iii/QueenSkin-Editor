name: Build Installers

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  macos-dmg:
    name: macOS DMG
    runs-on: macos-14
    defaults:
      run:
        working-directory: src-tauri
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build
        uses: swatinem/rust-cache@v2
        with:
          workspaces: |
            src-tauri -> target

      - name: Install Tauri CLI
        run: cargo install tauri-cli --version "^2" --locked

      - name: Build DMG
        run: cargo tauri build --bundles dmg

      - name: Upload DMG
        uses: actions/upload-artifact@v4
        with:
          name: queenskin-editor-macos-dmg
          path: src-tauri/target/release/bundle/dmg/*.dmg
          if-no-files-found: error

  windows-exe:
    name: Windows EXE
    runs-on: windows-latest
    defaults:
      run:
        shell: pwsh
        working-directory: src-tauri
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build
        uses: swatinem/rust-cache@v2
        with:
          workspaces: |
            src-tauri -> target

      - name: Install Tauri CLI
        run: cargo install tauri-cli --version "^2" --locked

      - name: Build EXE (NSIS)
        run: cargo tauri build --bundles nsis

      - name: Upload EXE
        uses: actions/upload-artifact@v4
        with:
          name: queenskin-editor-windows-exe
          path: src-tauri/target/release/bundle/nsis/*.exe
          if-no-files-found: error
